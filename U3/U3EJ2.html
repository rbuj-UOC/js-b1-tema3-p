<script defer id="solutionJS">
  // Escribe aquí tu solución / escriviu aquí la vostra solució:
  function showClass(event) {
    document.getElementById("myContent").textContent = event.target.classList[0];
  }

  const divsParent = document.getElementsByClassName("container")[0];

  const l1 = divsParent.children[0].addEventListener("click", showClass);
  const l2 = divsParent.children[1].addEventListener("click", showClass);
  const l3 = divsParent.children[2].addEventListener("click", showClass);
</script>
